<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noise Canvas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #111;
      color: #ccc;
      font-family: system-ui, sans-serif;
    }

    .tool {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.75rem;
      width: min(960px, 96vw);
    }

    .text-input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #fff;
      font: inherit;
      font-size: 1rem;
    }

    .text-input:focus {
      outline: none;
      border-color: #666;
    }

    .frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    p {
      font-size: 0.875rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="tool">
    <input
      class="text-input"
      id="overlay-text"
      type="text"
      placeholder="Enter text to overlay..."
      autocomplete="off"
      spellcheck="false"
    />
    <div class="frame">
      <canvas id="noise"></canvas>
    </div>
    <p>Use <kbd>↑</kbd> / <kbd>↓</kbd> to move!</p>
  </div>

  <script>
    /*
     * NOISE TEXT CANVAS — how this works
     *
     * Think of the final image as two stacked layers, like Photoshop:
     *
     *   Layer 2 (top):    noise that only shows INSIDE the letter shapes
     *   Layer 1 (bottom): full-screen noise that scrolls downward
     *
     * The text is not drawn as solid letters. Instead, the letter shapes act
     * as a "mask" — a stencil that decides where layer 2 is visible.
     *
     * When you hold an arrow key:
     *   ↓  background noise scrolls DOWN, letter noise scrolls UP
     *   ↑  background noise scrolls UP,   letter noise scrolls DOWN
     *
     * Key ideas used:
     *   - ImageData: raw pixel buffers we can read/write directly (fast scrolling)
     *   - Offscreen canvases: hidden canvases used as scratch space for masking
     *   - globalCompositeOperation: canvas blending modes (we use "destination-in")
     *   - requestAnimationFrame: browser's ~60fps loop for smooth animation
     */

    // --- Setup: main visible canvas ---

    const TAKE_INPUT = false;

    const canvas = document.getElementById("noise");
    const textInput = document.getElementById("overlay-text");
    // willReadFrequently hints to the browser that we'll often read pixel data back
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    if  (TAKE_INPUT) {
      textInput.style.display = "block";
    } else {
      textInput.style.display = "none";
    }

    const WIDTH = 640;
    const HEIGHT = 360;

    // Pixels moved per frame while an arrow key is held. Lower = slower (fractions OK).
    const NOISE_SCROLL_SPEED = 0.35;

    // Padding around wrapped text so letters don't touch the canvas edge
    const TEXT_PADDING = 24;
    const LINE_HEIGHT_RATIO = 1.15;

    // Internal pixel resolution (640×360). CSS scales it up to 16:9 on screen.
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // --- Pixel buffers for the two noise layers ---
    // ImageData holds a flat array of RGBA values: [R,G,B,A, R,G,B,A, ...]
    // We use 0 or 255 for R/G/B to get pure black or white noise.
    let backgroundNoise = ctx.createImageData(WIDTH, HEIGHT);
    let maskedNoise = ctx.createImageData(WIDTH, HEIGHT);

    // --- Offscreen canvases (not shown in the page) ---
    // maskCanvas:         white letter shapes on transparent background
    // maskedNoiseCanvas:  the full second noise layer, copied from maskedNoise
    // compositeCanvas:    scratch space where we combine noise + mask
    const maskCanvas = document.createElement("canvas");
    maskCanvas.width = WIDTH;
    maskCanvas.height = HEIGHT;
    const maskCtx = maskCanvas.getContext("2d");

    const maskedNoiseCanvas = document.createElement("canvas");
    maskedNoiseCanvas.width = WIDTH;
    maskedNoiseCanvas.height = HEIGHT;
    const maskedNoiseCtx = maskedNoiseCanvas.getContext("2d");

    const compositeCanvas = document.createElement("canvas");
    compositeCanvas.width = WIDTH;
    compositeCanvas.height = HEIGHT;
    const compositeCtx = compositeCanvas.getContext("2d");

    // -1 = up arrow (background up), 0 = idle, 1 = down arrow (background down)
    let scrollDirection = 0;
    let scrollAccumulator = 0;

    // --- Noise generation ---

    // Fill a pixel buffer with random black (div) or white (255) pixels.
    function fillNoise(data) {
      // Step by 4 because each pixel is 4 bytes: Red, Green, Blue, Alpha
      for (let i = 0; i < data.length; i += 4) {
        const value = Math.random() < 0.5 ? 0 : 255;
        data[i] = value;     // R
        data[i + 1] = value; // G
        data[i + 2] = value; // B
        data[i + 3] = 255;   // A (fully opaque)
      }
    }

    // --- Scrolling: shift pixel rows and fill the exposed edge with new noise ---
    // Visual "scroll down" = every row copies the row above it; top row is regenerated.

    function scrollDown(data, pixels = 2) {
      const rowBytes = WIDTH * 4; // one row of pixels in bytes

      for (let step = 0; step < pixels; step++) {
        // Move rows 0..(HEIGHT-2) down into rows 1..(HEIGHT-1)
        data.copyWithin(rowBytes, 0, rowBytes * (HEIGHT - 1));

        // Fill the new empty top row with fresh random noise
        for (let x = 0; x < WIDTH; x++) {
          const value = Math.random() < 0.5 ? 0 : 255;
          const i = x * 4;
          data[i] = value;
          data[i + 1] = value;
          data[i + 2] = value;
          data[i + 3] = 255;
        }
      }
    }

    // Visual "scroll up" = every row copies the row below it; bottom row is regenerated.

    function scrollUp(data, pixels = 2) {
      const rowBytes = WIDTH * 4;
      const bottomRowStart = rowBytes * (HEIGHT - 1);

      for (let step = 0; step < pixels; step++) {
        // Move rows 1..(HEIGHT-1) up into rows 0..(HEIGHT-2)
        data.copyWithin(0, rowBytes, rowBytes * HEIGHT);

        // Fill the new empty bottom row with fresh random noise
        for (let x = 0; x < WIDTH; x++) {
          const value = Math.random() < 0.5 ? 0 : 255;
          const i = bottomRowStart + x * 4;
          data[i] = value;
          data[i + 1] = value;
          data[i + 2] = value;
          data[i + 3] = 255;
        }
      }
    }

    // --- Text mask ---

    function getOverlayText() {
      if (TAKE_INPUT) {
        return textInput.value.toUpperCase();
      }
      return "CAN YOU READ THIS?";
    }

    function setMaskFont(size) {
      maskCtx.font = `bold ${size}px system-ui, sans-serif`;
    }

    // Split a single word that exceeds maxWidth into smaller chunks
    function breakLongWord(word, maxWidth) {
      const parts = [];
      let current = "";

      for (const char of word) {
        const test = current + char;
        if (maskCtx.measureText(test).width <= maxWidth) {
          current = test;
        } else {
          if (current) {
            parts.push(current);
          }
          current = char;
        }
      }

      if (current) {
        parts.push(current);
      }

      return parts;
    }

    // Wrap one paragraph to fit within maxWidth (word boundaries, then character breaks)
    function wrapParagraph(paragraph, maxWidth) {
      const words = paragraph.split(/\s+/).filter(Boolean);
      if (words.length === 0) {
        return [];
      }

      const lines = [];
      let currentLine = words[0];

      if (maskCtx.measureText(currentLine).width > maxWidth) {
        const parts = breakLongWord(currentLine, maxWidth);
        currentLine = parts.pop() || "";
        lines.push(...parts);
      }

      for (let i = 1; i < words.length; i++) {
        const word = words[i];
        const testLine = `${currentLine} ${word}`;

        if (maskCtx.measureText(testLine).width <= maxWidth) {
          currentLine = testLine;
          continue;
        }

        lines.push(currentLine);

        if (maskCtx.measureText(word).width <= maxWidth) {
          currentLine = word;
        } else {
          const parts = breakLongWord(word, maxWidth);
          currentLine = parts.pop() || "";
          lines.push(...parts);
        }
      }

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines;
    }

    // Split on newlines, then wrap each line to fit the canvas width
    function wrapText(text, maxWidth) {
      return text
        .split(/\n/)
        .flatMap((paragraph) => wrapParagraph(paragraph.trim(), maxWidth))
        .filter(Boolean);
    }

    // Shrink font size until wrapped lines fit inside the canvas
    function getTextLayout(text) {
      const maxWidth = WIDTH - TEXT_PADDING * 2;
      const maxHeight = HEIGHT - TEXT_PADDING * 2;
      const minFontSize = 12;
      let fontSize = Math.min(WIDTH / 6, HEIGHT * 0.28);

      while (fontSize >= minFontSize) {
        setMaskFont(fontSize);
        const lines = wrapText(text, maxWidth);
        const lineHeight = fontSize * LINE_HEIGHT_RATIO;
        const totalHeight = lines.length * lineHeight;
        const widestLine = lines.reduce(
          (max, line) => Math.max(max, maskCtx.measureText(line).width),
          0
        );

        if (totalHeight <= maxHeight && widestLine <= maxWidth) {
          return { fontSize, lines, lineHeight };
        }

        fontSize -= 1;
      }

      setMaskFont(minFontSize);
      const lines = wrapText(text, maxWidth);
      return {
        fontSize: minFontSize,
        lines,
        lineHeight: minFontSize * LINE_HEIGHT_RATIO,
      };
    }

    function drawWrappedText(lines, fontSize, lineHeight) {
      setMaskFont(fontSize);
      maskCtx.textAlign = "center";
      maskCtx.textBaseline = "middle";
      maskCtx.fillStyle = "#fff";

      const totalHeight = lines.length * lineHeight;
      const startY = (HEIGHT - totalHeight) / 2 + lineHeight / 2;

      lines.forEach((line, index) => {
        maskCtx.fillText(line, WIDTH / 2, startY + index * lineHeight);
      });
    }

    // Draw white letter shapes onto maskCanvas.
    // White = "keep noise here". Transparent everywhere else = "hide noise".
    function updateMask() {
      const text = getOverlayText();
      maskCtx.clearRect(0, 0, WIDTH, HEIGHT);

      if (!text) {
        return;
      }

      const layout = getTextLayout(text);
      drawWrappedText(layout.lines, layout.fontSize, layout.lineHeight);
    }

    // --- Compositing: clip the second noise layer to the letter shapes ---

    function drawMaskedNoiseLayer() {
      const text = getOverlayText();
      if (!text) {
        return;
      }

      compositeCtx.clearRect(0, 0, WIDTH, HEIGHT);

      // 1. Draw the full second noise layer
      compositeCtx.drawImage(maskedNoiseCanvas, 0, 0);

      // 2. "destination-in": keep only pixels where the mask is opaque (the letters)
      compositeCtx.globalCompositeOperation = "destination-in";
      compositeCtx.drawImage(maskCanvas, 0, 0);
      compositeCtx.globalCompositeOperation = "source-over"; // reset to default

      // 3. Paste the clipped result onto the main canvas
      ctx.drawImage(compositeCanvas, 0, 0);
    }

    // Draw both layers onto the visible canvas (background first, letters on top)
    function draw() {
      ctx.putImageData(backgroundNoise, 0, 0);
      drawMaskedNoiseLayer();
    }

    // --- Animation loop ---
    // requestAnimationFrame runs ~60 times per second. While an arrow key is held,
    // we scroll both noise buffers in opposite directions and redraw.

    function tick() {
      if (scrollDirection === 0) {
        scrollAccumulator = 0;
      } else {
        scrollAccumulator += NOISE_SCROLL_SPEED;
        const pixels = Math.floor(scrollAccumulator);

        if (pixels > 0) {
          scrollAccumulator -= pixels;

          if (scrollDirection === 1) {
            scrollDown(backgroundNoise.data, pixels);
            scrollUp(maskedNoise.data, pixels);
          } else {
            scrollUp(backgroundNoise.data, pixels);
            scrollDown(maskedNoise.data, pixels);
          }

          maskedNoiseCtx.putImageData(maskedNoise, 0, 0);
          draw();
        }
      }

      requestAnimationFrame(tick);
    }

    // --- Initialize ---

    fillNoise(backgroundNoise.data);
    fillNoise(maskedNoise.data);
    maskedNoiseCtx.putImageData(maskedNoise, 0, 0);
    updateMask();
    draw();
    requestAnimationFrame(tick);

    // --- Events ---

    // Rebuild the letter mask whenever the user types
    textInput.addEventListener("input", () => {
      updateMask();
      draw();
    });

    window.addEventListener("keydown", (event) => {
      if (document.activeElement === textInput) {
        return;
      }

      if (event.code === "ArrowDown") {
        event.preventDefault();
        scrollDirection = 1;
      } else if (event.code === "ArrowUp") {
        event.preventDefault();
        scrollDirection = -1;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowDown" && scrollDirection === 1) {
        scrollDirection = 0;
      } else if (event.code === "ArrowUp" && scrollDirection === -1) {
        scrollDirection = 0;
      }
    });

    // Stop scrolling if the user switches tabs or clicks away
    window.addEventListener("blur", () => {
      scrollDirection = 0;
    });
  </script>
</body>
</html>
